<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Store Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2024; --steel:#4A5568; --steel-light:#7A8494; --paper:#ECEEF1; --card:#FFFFFF;
    --amber:#D98E04; --amber-bg:#FDF3DF; --teal:#1F7A6C; --teal-bg:#E4F3EF;
    --red:#C0392B; --red-bg:#FBE8E5; --line:#DADDE2; --line-strong:#C2C6CC;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);font-family:'Inter',system-ui,sans-serif;color:var(--ink);}
  .wrap{max-width:1200px;margin:0 auto;padding:28px 24px 60px;}
  .topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap;gap:16px;}
  .topbar h1{font-family:'Oswald',sans-serif;font-weight:600;font-size:26px;letter-spacing:0.5px;text-transform:uppercase;margin:0;}
  .topbar .sub{font-size:13px;color:var(--steel);margin-top:4px;}
  .stat-row{display:flex;gap:10px;flex-wrap:wrap;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:8px 16px;min-width:80px;text-align:center;}
  .stat .n{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;}
  .stat .l{font-size:10px;color:var(--steel);text-transform:uppercase;letter-spacing:0.4px;}
  .stat.warn .n{color:var(--amber);}
  .stat.danger .n{color:var(--red);}

  .lowstock-banner{background:var(--amber-bg);border:1px solid var(--amber);border-left:4px solid var(--amber);border-radius:4px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:#7A4F02;display:none;}
  .lowstock-banner.show{display:block;}
  .lowstock-banner b{color:#5A3A01;}

  .toolbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
  .toolbar input[type=text], .toolbar select{
    height:38px;border:1px solid var(--line-strong);border-radius:4px;padding:0 12px;font-size:14px;background:var(--card);color:var(--ink);font-family:inherit;
  }
  .toolbar input[type=text]{flex:1;min-width:200px;}
  .toolbar select{min-width:150px;}
  .btn{height:38px;padding:0 18px;border-radius:4px;border:1px solid var(--ink);background:var(--ink);color:#fff;font-weight:600;font-size:13px;letter-spacing:0.3px;cursor:pointer;text-transform:uppercase;}
  .btn:hover{background:#333;}
  .btn.secondary{background:var(--card);color:var(--ink);border:1px solid var(--line-strong);}
  .btn.secondary:hover{background:var(--paper);}
  .btn.small{height:30px;padding:0 12px;font-size:12px;}
  .result-note{font-size:12px;color:var(--steel);margin-bottom:10px;}

  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  thead th{text-align:left;font-family:'Oswald',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--steel);background:var(--paper);padding:9px 10px;border-bottom:1px solid var(--line-strong);font-weight:500;}
  tbody td{padding:9px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FAFAF9;}
  .code{font-family:'Inter',monospace;font-size:12px;color:var(--steel);}
  .pname{font-weight:600;}
  .sec-tag{display:inline-block;font-size:11px;background:var(--paper);border:1px solid var(--line);border-radius:3px;padding:2px 8px;color:var(--steel);white-space:nowrap;}
  .loc{font-family:'Inter',monospace;font-size:12px;color:var(--steel-light);}

  .qty-cell{display:flex;align-items:center;gap:6px;}
  .qty-btn{width:24px;height:24px;border-radius:3px;border:1px solid var(--line-strong);background:var(--card);cursor:pointer;font-size:14px;line-height:1;color:var(--ink);}
  .qty-btn:hover{background:var(--paper);}
  .qty-num{min-width:26px;text-align:center;font-weight:600;font-family:'Oswald',sans-serif;font-size:14px;}
  .unit{font-size:11px;color:var(--steel);}

  .status-pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:3px;}
  .status-pill.ok{background:var(--teal-bg);color:var(--teal);}
  .status-pill.low{background:var(--amber-bg);color:var(--amber);}
  .status-pill.out{background:var(--red-bg);color:var(--red);}

  .row-actions{display:flex;gap:6px;}
  .icon-btn{width:28px;height:28px;border-radius:3px;border:1px solid var(--line-strong);background:var(--card);cursor:pointer;color:var(--steel);font-size:12px;}
  .icon-btn:hover{background:var(--paper);}
  .icon-btn.del:hover{background:var(--red-bg);border-color:var(--red);color:var(--red);}

  .pagination{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:13px;color:var(--steel);flex-wrap:wrap;gap:10px;}
  .pagination .pg-btns{display:flex;gap:6px;}

  .empty{text-align:center;padding:50px 20px;color:var(--steel);}
  .empty b{display:block;font-family:'Oswald',sans-serif;font-size:16px;color:var(--ink);margin-bottom:4px;text-transform:uppercase;}

  .overlay{position:fixed;inset:0;background:rgba(20,22,25,0.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:var(--card);border-radius:6px;width:100%;max-width:440px;padding:24px;max-height:90vh;overflow:auto;}
  .modal h2{font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:18px;margin:0 0 18px;letter-spacing:0.4px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--steel);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.3px;}
  .field input,.field select{width:100%;height:38px;border:1px solid var(--line-strong);border-radius:4px;padding:0 12px;font-size:14px;font-family:inherit;color:var(--ink);}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
  .err{color:var(--red);font-size:12px;margin-top:4px;display:none;}
  .err.show{display:block;}
  .loading{text-align:center;padding:60px;color:var(--steel);font-size:14px;}

  @media(max-width:700px){
    .field-row{flex-direction:column;gap:0;}
    table, thead, tbody, th, td, tr{display:block;}
    thead{display:none;}
    tbody tr{border-bottom:2px solid var(--line);padding:10px 0;}
    tbody td{border:none;padding:4px 12px;display:flex;justify-content:space-between;align-items:center;}
    tbody td:before{content:attr(data-label);font-size:11px;color:var(--steel);text-transform:uppercase;font-weight:600;}
  }

  .auth-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .auth-tag{font-size:11px;padding:4px 10px;border-radius:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
  .auth-tag.view{background:var(--paper);color:var(--steel);border:1px solid var(--line-strong);}
  .auth-tag.edit{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal);}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Mini store inventory</h1>
      <div class="sub" id="subtitle">Loading...</div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="n" id="statTotal">0</div><div class="l">Items</div></div>
      <div class="stat warn"><div class="n" id="statLow">0</div><div class="l">Low stock</div></div>
      <div class="stat danger"><div class="n" id="statOut">0</div><div class="l">Out of stock</div></div>
    </div>
  </div>

  <div class="lowstock-banner" id="lowBanner"></div>

  <div class="auth-row">
    <span class="auth-tag view" id="authTag">Viewing only</span>
    <button class="btn secondary small" id="loginBtn">Login to edit</button>
    <button class="btn secondary small" id="logoutBtn" style="display:none;">Logout</button>
  </div>

  <div class="toolbar">
    <input type="text" id="searchBox" placeholder="Search by item name, code or location...">
    <select id="sectionFilter"><option value="">All sections</option></select>
    <button class="btn" id="addBtn">+ Add item</button>
    <button class="btn secondary" id="exportBtn">Export backup</button>
    <button class="btn secondary" id="importBtn">Import backup</button>
    <input type="file" id="importFile" accept=".json" style="display:none;">
  </div>

  <div id="tableHolder"><div class="loading">Loading inventory...</div></div>
  <div class="pagination" id="pagination" style="display:none;">
    <div id="pgInfo"></div>
    <div class="pg-btns">
      <button class="btn secondary small" id="prevBtn">Prev</button>
      <button class="btn secondary small" id="nextBtn">Next</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Add item</h2>
    <div class="field">
      <label>Item name</label>
      <input type="text" id="f_name" placeholder="e.g. Bearing - 22309BD1">
      <div class="err" id="err_name">Item name is required.</div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Code no.</label>
        <input type="text" id="f_code" placeholder="e.g. A62.01.02">
      </div>
      <div class="field">
        <label>Section</label>
        <input type="text" id="f_section" placeholder="e.g. Section 01" list="sectionList">
        <datalist id="sectionList"></datalist>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Location (rack/shelf)</label>
        <input type="text" id="f_location" placeholder="e.g. R1/S1/D1">
      </div>
      <div class="field">
        <label>Unit</label>
        <input type="text" id="f_unit" placeholder="Nos, Box, etc">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Quantity</label>
        <input type="number" id="f_quantity" placeholder="0" min="0">
        <div class="err" id="err_quantity">Enter a valid quantity.</div>
      </div>
      <div class="field">
        <label>Low stock alert below</label>
        <input type="number" id="f_threshold" placeholder="2" min="0">
      </div>
    </div>
    <div class="field">
      <label>Price per unit (Rs.)</label>
      <input type="number" id="f_price" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="modal-actions">
      <button class="btn secondary" id="cancelBtn">Cancel</button>
      <button class="btn" id="saveBtn">Save item</button>
    </div>
  </div>
</div>

<div class="overlay" id="loginOverlay">
  <div class="modal" style="max-width:340px;">
    <h2>Editor login</h2>
    <div class="field">
      <label>Password</label>
      <input type="password" id="f_password" placeholder="Enter edit password">
      <div class="err" id="err_password">Wrong password.</div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" id="loginCancelBtn">Cancel</button>
      <button class="btn" id="loginSubmitBtn">Login</button>
    </div>
  </div>
</div>

<script>
let products = [];
let editingId = null;
const EDIT_PASSWORD_HASH = '8b3d9bca7c134a9190277204379941460eb33c39868309401f02fa8e0391d4a7';
// ^ this is a SHA-256 hash of the password, NOT the password itself (so it can't be read in view-source).
// Default password is: store123
// To set your own password: ask Claude to generate the SHA-256 hash for your new password and paste it above.
let isEditor = false;
let searchTerm = '';
let sectionFilter = '';
let currentPage = 1;
const PAGE_SIZE = 100;

function uid(){ return 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

async function loadProducts(){
  let loaded = null;
  try{
    const raw = localStorage.getItem('mini_products');
    loaded = raw ? JSON.parse(raw) : null;
  }catch(e){ loaded = null; }
  if(!loaded || loaded.length === 0){
    const seedEl = document.getElementById('seedData');
    products = JSON.parse(seedEl.textContent);
    await saveProducts();
  } else {
    products = loaded;
  }
  isEditor = localStorage.getItem('mini_editor_auth') === 'true';
  updateAuthUI();
  render();
}

async function saveProducts(){
  try{
    localStorage.setItem('mini_products', JSON.stringify(products));
  }catch(e){
    console.error('Save failed', e);
    alert('Save panna mudiyala. Konjam neram kalichu try pannunga.');
  }
}

function exportData(){
  const blob = new Blob([JSON.stringify(products, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'mini_store_inventory_backup.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event){
  if(!requireEditor()) { event.target.value=''; return; }
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(e){
    try{
      const imported = JSON.parse(e.target.result);
      if(!Array.isArray(imported)) throw new Error('Invalid format');
      if(!confirm(`${imported.length} items import pannalama? Ippo irukkira data replace aagum.`)) return;
      products = imported;
      await saveProducts();
      render();
      alert('Import success!');
    }catch(err){
      alert('Import fail aachu. File format check pannunga.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function stockClass(p){
  if(p.quantity <= 0) return 'out';
  if(p.quantity <= (p.threshold || 0)) return 'low';
  return 'ok';
}
function money(n){ return 'Rs. ' + Number(n||0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function stockText(p){
  const c = stockClass(p);
  if(c==='out') return 'Out';
  if(c==='low') return 'Low';
  return 'OK';
}

function getFiltered(){
  const term = searchTerm.trim().toLowerCase();
  return products.filter(p=>{
    const matchSearch = !term || p.name.toLowerCase().includes(term) || (p.code||'').toLowerCase().includes(term) || (p.location||'').toLowerCase().includes(term);
    const matchSection = !sectionFilter || p.section === sectionFilter;
    return matchSearch && matchSection;
  });
}

function updateAuthUI(){
  const tag = document.getElementById('authTag');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const addBtn = document.getElementById('addBtn');
  const importBtn = document.getElementById('importBtn');
  if(isEditor){
    tag.textContent = 'Editor mode';
    tag.classList.remove('view'); tag.classList.add('edit');
    loginBtn.style.display = 'none';
    logoutBtn.style.display = '';
    addBtn.style.display = '';
    importBtn.style.display = '';
  } else {
    tag.textContent = 'Viewing only';
    tag.classList.remove('edit'); tag.classList.add('view');
    loginBtn.style.display = '';
    logoutBtn.style.display = 'none';
    addBtn.style.display = 'none';
    importBtn.style.display = 'none';
  }
}

function openLogin(){
  document.getElementById('f_password').value = '';
  document.getElementById('err_password').classList.remove('show');
  document.getElementById('loginOverlay').classList.add('show');
}
function closeLogin(){ document.getElementById('loginOverlay').classList.remove('show'); }
async function sha256Hex(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function tryLogin(){
  const pw = document.getElementById('f_password').value;
  const hash = await sha256Hex(pw);
  if(hash === EDIT_PASSWORD_HASH){
    isEditor = true;
    localStorage.setItem('mini_editor_auth', 'true');
    closeLogin();
    updateAuthUI();
    render();
  } else {
    document.getElementById('err_password').classList.add('show');
  }
}
function logout(){
  isEditor = false;
  localStorage.removeItem('mini_editor_auth');
  updateAuthUI();
  render();
}
function requireEditor(){
  if(!isEditor){ openLogin(); return false; }
  return true;
}

function render(){
  const total = products.length;
  const low = products.filter(p => p.quantity > 0 && p.quantity <= (p.threshold||0)).length;
  const out = products.filter(p => p.quantity <= 0).length;
  document.getElementById('statTotal').textContent = total.toLocaleString('en-IN');
  document.getElementById('statLow').textContent = low.toLocaleString('en-IN');
  document.getElementById('statOut').textContent = out.toLocaleString('en-IN');
  document.getElementById('subtitle').textContent = total.toLocaleString('en-IN') + ' items across ' + new Set(products.map(p=>p.section)).size + ' sections';

  const lowItems = products.filter(p => p.quantity > 0 && p.quantity <= (p.threshold||0));
  const banner = document.getElementById('lowBanner');
  if(lowItems.length > 0){
    banner.classList.add('show');
    banner.innerHTML = '<b>' + lowItems.length.toLocaleString('en-IN') + ' item' + (lowItems.length!==1?'s':'') + ' running low.</b> Use search or the section filter to find and restock them.';
  } else {
    banner.classList.remove('show');
  }

  const sections = [...new Set(products.map(p=>p.section).filter(Boolean))].sort();
  const secSel = document.getElementById('sectionFilter');
  const curVal = secSel.value;
  secSel.innerHTML = '<option value="">All sections</option>' + sections.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
  secSel.value = curVal;
  document.getElementById('sectionList').innerHTML = sections.map(s=>`<option value="${escapeHtml(s)}">`).join('');

  const filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if(currentPage > totalPages) currentPage = totalPages;
  const startIdx = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(startIdx, startIdx + PAGE_SIZE);

  const holder = document.getElementById('tableHolder');
  const pagDiv = document.getElementById('pagination');

  if(products.length === 0){
    holder.innerHTML = '<div class="empty"><b>No items yet</b>Store la irukkira items add pannunga.</div>';
    pagDiv.style.display = 'none';
    return;
  }
  if(filtered.length === 0){
    holder.innerHTML = '<div class="empty"><b>No matches</b>Search or filter maathi paarunga.</div>';
    pagDiv.style.display = 'none';
    return;
  }

  let rows = pageItems.map(p=>{
    const sc = stockClass(p);
    return `
    <tr>
      <td data-label="Code"><span class="code">${escapeHtml(p.code||'-')}</span></td>
      <td data-label="Item"><div class="pname">${escapeHtml(p.name)}</div></td>
      <td data-label="Section"><span class="sec-tag">${escapeHtml(p.section||'-')}</span></td>
      <td data-label="Location"><span class="loc">${escapeHtml(p.location||'-')}</span></td>
      <td data-label="Quantity">
        <div class="qty-cell">
          <button class="qty-btn" onclick="adjustQty('${p.id}', -1)">-</button>
          <span class="qty-num">${p.quantity}</span>
          <button class="qty-btn" onclick="adjustQty('${p.id}', 1)">+</button>
          <span class="unit">${escapeHtml(p.unit||'')}</span>
        </div>
      </td>
      <td data-label="Price">${money(p.price)}</td>
      <td data-label="Status"><span class="status-pill ${sc}">${stockText(p)}</span></td>
      <td data-label="Actions">
        <div class="row-actions">
          <button class="icon-btn" onclick="openEdit('${p.id}')" title="Edit">Edit</button>
          <button class="icon-btn del" onclick="deleteProduct('${p.id}')" title="Delete">Del</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  holder.innerHTML = `
    <table>
      <thead><tr><th>Code</th><th>Item</th><th>Section</th><th>Location</th><th>Quantity</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  pagDiv.style.display = 'flex';
  document.getElementById('pgInfo').textContent =
    `Showing ${(startIdx+1).toLocaleString('en-IN')}-${Math.min(startIdx+PAGE_SIZE, filtered.length).toLocaleString('en-IN')} of ${filtered.length.toLocaleString('en-IN')}`;
  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages;
}

async function adjustQty(id, delta){
  if(!requireEditor()) return;
  const p = products.find(x=>x.id===id);
  if(!p) return;
  p.quantity = Math.max(0, (p.quantity||0) + delta);
  render();
  await saveProducts();
}

function openAdd(){
  if(!requireEditor()) return;
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add item';
  document.getElementById('f_name').value = '';
  document.getElementById('f_code').value = '';
  document.getElementById('f_section').value = '';
  document.getElementById('f_location').value = '';
  document.getElementById('f_unit').value = 'Nos';
  document.getElementById('f_quantity').value = '';
  document.getElementById('f_threshold').value = '2';
  document.getElementById('f_price').value = '';
  clearErrors();
  document.getElementById('overlay').classList.add('show');
}

function openEdit(id){
  if(!requireEditor()) return;
  const p = products.find(x=>x.id===id);
  if(!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit item';
  document.getElementById('f_name').value = p.name;
  document.getElementById('f_code').value = p.code||'';
  document.getElementById('f_section').value = p.section||'';
  document.getElementById('f_location').value = p.location||'';
  document.getElementById('f_unit').value = p.unit||'Nos';
  document.getElementById('f_quantity').value = p.quantity;
  document.getElementById('f_threshold').value = p.threshold||0;
  document.getElementById('f_price').value = p.price||'';
  clearErrors();
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){ document.getElementById('overlay').classList.remove('show'); }
function clearErrors(){
  document.getElementById('err_name').classList.remove('show');
  document.getElementById('err_quantity').classList.remove('show');
}

async function saveProduct(){
  const name = document.getElementById('f_name').value.trim();
  const qtyRaw = document.getElementById('f_quantity').value;
  clearErrors();
  let valid = true;
  if(!name){ document.getElementById('err_name').classList.add('show'); valid = false; }
  if(qtyRaw === '' || isNaN(qtyRaw) || Number(qtyRaw) < 0){ document.getElementById('err_quantity').classList.add('show'); valid = false; }
  if(!valid) return;

  const data = {
    name: name,
    code: document.getElementById('f_code').value.trim(),
    section: document.getElementById('f_section').value.trim() || 'Uncategorized',
    location: document.getElementById('f_location').value.trim(),
    unit: document.getElementById('f_unit').value.trim() || 'Nos',
    quantity: Number(qtyRaw),
    threshold: Number(document.getElementById('f_threshold').value || 0),
    price: Number(document.getElementById('f_price').value || 0)
  };

  if(editingId){
    const p = products.find(x=>x.id===editingId);
    Object.assign(p, data);
  } else {
    products.push({ id: uid(), ...data });
  }
  closeModal();
  render();
  await saveProducts();
}

async function deleteProduct(id){
  if(!requireEditor()) return;
  const p = products.find(x=>x.id===id);
  if(!p) return;
  if(!confirm(`"${p.name}" nu delete pannalama?`)) return;
  products = products.filter(x=>x.id!==id);
  render();
  await saveProducts();
}

document.getElementById('addBtn').addEventListener('click', openAdd);
document.getElementById('exportBtn').addEventListener('click', exportData);
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', importData);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('saveBtn').addEventListener('click', saveProduct);
document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });
document.getElementById('searchBox').addEventListener('input', (e)=>{ searchTerm = e.target.value; currentPage = 1; render(); });
document.getElementById('sectionFilter').addEventListener('change', (e)=>{ sectionFilter = e.target.value; currentPage = 1; render(); });
document.getElementById('prevBtn').addEventListener('click', ()=>{ if(currentPage>1){ currentPage--; render(); window.scrollTo(0,0); } });
document.getElementById('nextBtn').addEventListener('click', ()=>{ currentPage++; render(); window.scrollTo(0,0); });

document.getElementById('loginBtn').addEventListener('click', openLogin);
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('loginCancelBtn').addEventListener('click', closeLogin);
document.getElementById('loginSubmitBtn').addEventListener('click', tryLogin);
document.getElementById('loginOverlay').addEventListener('click', (e)=>{ if(e.target.id==='loginOverlay') closeLogin(); });
document.getElementById('f_password').addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryLogin(); });

loadProducts();
</script>
</body>
</html>
